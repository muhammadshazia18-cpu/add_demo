<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - EBook System</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #d9d9d9;
    }

    /* Navbar */
    .navbar {
        background-color: #2c3e50;
        padding: 15px 0;
        text-align: center;
        color: white;
        font-size: 22px;
        font-weight: bold;
    }

    /* Center form */
    .form-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 85vh;
    }

    /* Login Card */
    form {
        background-color: #7b6d6d;
        padding: 30px;
        width: 300px;
        border-radius: 8px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        text-align: center;
    }

    form h2 {
        margin-bottom: 20px;
        color: black;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border: none;
        border-radius: 4px;
    }

    button {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        background-color: #3498db;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 15px;
    }

    button:hover {
        background-color: #2980b9;
    }

    .link {
        margin-top: 12px;
        display: block;
        color: white;
        font-size: 14px;
        text-decoration: none;
    }

    .link:hover {
        text-decoration: underline;
    }
</style>

</head>
<body>

<div class="navbar">
    E-Book System
</div>

<div class="form-container">
    <form action="login.php" method="POST">
        <h2>Login</h2>

        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>

        <a href="register.html" class="link">New user? Register here</a>
    </form>
</div>

</body>
</html>
