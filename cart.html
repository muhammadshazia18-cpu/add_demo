<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - EBook System</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #d9d9d9;
    }

    .navbar {
        background-color: #2c3e50;
        padding: 15px;
        text-align: center;
        color: white;
        font-size: 22px;
        font-weight: bold;
    }

    .nav-links {
        margin-top: 5px;
        font-size: 14px;
    }

    .nav-links a {
        color: white;
        text-decoration: none;
        margin: 0 10px;
    }

    .nav-links a:hover {
        text-decoration: underline;
    }

    .cart-container {
        width: 80%;
        margin: 40px auto;
        background-color: #7b6d6d;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        color: white;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 20px;
    }

    th, td {
        padding: 10px;
        text-align: center;
        border-bottom: 1px solid #ddd;
    }

    th {
        background-color: #5f5454;
    }

    .total {
        text-align: right;
        font-size: 18px;
        margin-bottom: 15px;
    }

    .checkout-btn {
        display: block;
        margin-left: auto;
        padding: 10px 20px;
        background-color: #3498db;
        border: none;
        border-radius: 4px;
        color: white;
        cursor: pointer;
        font-size: 16px;
    }

    .checkout-btn:hover {
        background-color: #2980b9;
    }
</style>

</head>
<body>

<div class="navbar">
    E-Book System
    <div class="nav-links">
        <a href="catalog.html">Catalog</a>
        <a href="cart.html">Cart</a>
        <a href="login.html">Logout</a>
    </div>
</div>

<div class="cart-container">
    <h2>Your Cart</h2>

    <table>
        <tr>
            <th>Book Name</th>
            <th>Price (₹)</th>
            <th>Quantity</th>
            <th>Total (₹)</th>
        </tr>

        <tr>
            <td>Web Development</td>
            <td>₹500</td>
            <td>1</td>
            <td>₹500</td>
        </tr>

        <tr>
            <td>Database Systems</td>
            <td>₹650</td>
            <td>1</td>
            <td>₹650</td>
        </tr>
    </table>

    <div class="total">
        <strong>Grand Total: ₹1150</strong>
    </div>

    <button class="checkout-btn">Proceed to Checkout</button>
</div>

</body>
</html>
